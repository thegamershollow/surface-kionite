---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: kinoite-surface
description: >-
  Fedora Kinoite 44 with the linux-surface kernel for Microsoft Surface Pro 7.
  Includes touchscreen, stylus, Secure Boot support, and Tailscale.
  Firefox is removed in favour of whatever browser you prefer as a Flatpak.

base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

modules:
  # Sets up cosign signing policies so rpm-ostree/bootc can verify this image
  # when you rebase to it via the signed image path.
  - type: signing

  # Create a Fedora 43-pinned linux-surface repo definition.
  # This works around linux-surface not yet publishing Fedora 44 metadata.
  - type: script
    snippets:
      - |
        cat > /etc/yum.repos.d/linux-surface.repo << 'EOF'
        [linux-surface]
        name=Linux Surface Repo
        baseurl=https://pkg.surfacelinux.com/fedora/f43/
        enabled=1
        gpgcheck=1
        repo_gpgcheck=0
        gpgkey=https://raw.githubusercontent.com/linux-surface/linux-surface/master/pkg/keys/surface.asc
        EOF

  # Install linux-surface and Tailscale packages.
  - type: rpm-ostree
    repos:
      - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
    install:
      - kernel-surface
      - iptsd
      - surface-secureboot
      - tailscale
    remove:
      - kernel
      - kernel-core
      - kernel-modules
      - kernel-modules-extra
      - firefox
      - firefox-langpacks

  # Ensure pinctrl_tigerlake loads before surface_aggregator.
  - type: script
    snippets:
      - |
        cat > /etc/modules-load.d/surface-modules.conf << 'EOF'
        pinctrl_tigerlake
        surface_aggregator
        surface_aggregator_registry
        surface_aggregator_hub
        surface_hid_core
        surface_hid
        surface_kbd
        EOF

        cat > /etc/dracut.conf.d/surface.conf << 'EOF'
        add_drivers+=" pinctrl_tigerlake surface_aggregator surface_aggregator_registry surface_aggregator_hub surface_hid_core surface_hid surface_kbd "
        EOF

  # Rebuild initramfs after kernel changes.
  - type: initramfs

  # Enable Tailscale.
  - type: systemd
    system:
      enabled:
        - tailscaled.service

  # Surface Pro 7 suspend settings.
  - type: kargs
    kargs:
      - mem_sleep_default=s2idle
